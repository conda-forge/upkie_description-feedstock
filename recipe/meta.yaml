{% set name = "upkie_description" %}
{% set version = "2.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/upkie_description-{{ version }}.tar.gz
  sha256: 594d37759c2682339bf46f5a5e7ab05f0d3461dad35fd9b640024075a9b552eb

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=2,<4
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - upkie_description
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/upkie_description
  summary: URDF description for the Upkie wheeled biped.
  dev_url: https://github.com/upkie/upkie_description
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - stephane-caron
